{{{breadcrumbsHtml}}}

<article class="tool-page">
  <header class="page-header">
    <span class="tool-icon">{{page.icon}}</span>
    <h1>{{page.title}}</h1>
    <p class="lead">{{page.description}}</p>
  </header>

  <div class="tool-workspace card" id="tool-root" data-tool="{{page.slug}}">
    <div class="tool-loading">Loading tool…</div>
  </div>

  <section class="example-section card">
    <h2>Example JWT</h2>
    <p>Click to load a sample token:</p>
    <button type="button" class="btn btn-secondary" id="load-example">Load HS256 Example</button>
    <textarea id="example-token" class="hidden" readonly>{{exampleToken}}</textarea>
  </section>

  {{{faqHtml}}}
  {{{relatedHtml}}}
</article>

<script type="module">
  import { initShareFromUrl } from '/assets/js/core/share.js';
  initShareFromUrl('token');
</script>
<script type="module" src="/assets/js/tools/{{toolScript}}"></script>
