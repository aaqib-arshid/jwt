{{{breadcrumbsHtml}}}

<article class="content-page trust-page">
  <header class="page-header">
    <h1>{{page.title}}</h1>
    <p class="lead">Contact the JWT Validator support team</p>
  </header>

  <div class="prose">
    {{{contentHtml}}}
  </div>

  <section class="contact-form-section card">
    <h2>Send a Message</h2>
    <form id="contact-form" class="contact-form" novalidate>
      <div class="form-row">
        <label for="contact-name">Your Name</label>
        <input type="text" id="contact-name" name="name" required placeholder="John Doe">
      </div>
      <div class="form-row">
        <label for="contact-email">Your Email</label>
        <input type="text" id="contact-email" name="email" required placeholder="you@example.com">
      </div>
      <div class="form-row">
        <label for="contact-subject">Subject</label>
        <select id="contact-subject" name="subject">
          <option value="Bug Report">Bug Report</option>
          <option value="Feature Request">Feature Request</option>
          <option value="Business Inquiry">Business Inquiry</option>
          <option value="General Question">General Question</option>
        </select>
      </div>
      <div class="form-row">
        <label for="contact-message">Message</label>
        <textarea id="contact-message" name="message" rows="6" required placeholder="Describe your question or issue…"></textarea>
      </div>
      <div class="btn-group">
        <button type="submit" class="btn btn-primary">Open in Email Client</button>
        <a href="mailto:{{contactEmail}}" class="btn btn-outline">Email Directly</a>
      </div>
      <p class="form-note">This form opens your email client — no data is sent to our servers.</p>
    </form>
  </section>

  {{{trustLinksHtml}}}
</article>

<script type="module" src="/assets/js/contact.js"></script>
