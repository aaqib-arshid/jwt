{{{breadcrumbsHtml}}}

<article class="content-page hub-page">
  <header class="page-header">
    <h1>{{page.title}}</h1>
    <p class="lead">{{page.description}}</p>
  </header>

  <section class="hub-grid">
    {{#each hubPages}}
    <a href="{{href}}" class="card card-link hub-card">
      <h2>{{title}}</h2>
      <p>{{description}}</p>
    </a>
    {{/each}}
  </section>

  {{{trustLinksHtml}}}
</article>
