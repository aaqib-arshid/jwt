{{{breadcrumbsHtml}}}

<article class="content-page">
  <header class="page-header">
    <h1>{{page.title}}</h1>
    {{#if page.description}}<p class="lead">{{page.description}}</p>{{/if}}
    {{{introHtml}}}
  </header>
  <ul class="index-list">
    {{#each listItems}}
    <li class="index-item card">
      <a href="{{href}}"><h2>{{title}}</h2></a>
      <p>{{description}}</p>
    </li>
    {{/each}}
  </ul>
  <section class="section">
    <h2>Explore More</h2>
    <p>Visit our <a href="/tools/jwt-decoder.html">JWT Decoder</a>, <a href="/guides/">Guides</a>, <a href="/glossary/">Glossary</a>, <a href="/resources.html">Resource Directory</a>, or <a href="/learning-path.html">Learning Path</a>.</p>
  </section>
</article>
