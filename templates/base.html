<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {{{metaHtml}}}
  <link rel="stylesheet" href="/assets/css/main.css">
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="{{site.themeColor}}">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8899635585691076"
     crossorigin="anonymous"></script>
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="/" class="logo">{{site.name}}</a>
      <div class="header-search" id="site-search-wrap">
        <input type="search" id="site-search" placeholder="Search JWT guides & tools…" aria-label="Search site" autocomplete="off">
        <div id="search-results" class="search-results hidden" role="listbox"></div>
      </div>
      <nav class="main-nav" aria-label="Main">
        {{#each site.nav}}
        <a href="{{href}}">{{label}}</a>
        {{/each}}
      </nav>
    </div>
  </header>

  <main class="container main-content">
    {{{body}}}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>&copy; {{year}} {{site.name}} — The most complete free JWT resource online. All tools run in your browser.</p>
      <nav class="footer-nav" aria-label="Footer">
        <a href="/tools/jwt-decoder.html">Decoder</a>
        <a href="/tools/jwt-validator.html">Validator</a>
        <a href="/guides/">Guides</a>
        <a href="/glossary/">Glossary</a>
        <a href="/resources.html">Resources</a>
        <a href="/compare/jwt-io-alternative.html">vs jwt.io</a>
      </nav>
      <nav class="footer-legal" aria-label="Legal">
        {{#each site.footerLegal}}
        <a href="{{href}}">{{label}}</a>
        {{/each}}
      </nav>
    </div>
  </footer>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script type="module" src="/assets/js/core/ui.js"></script>
  <script type="module" src="/assets/js/search.js"></script>
</body>
</html>
