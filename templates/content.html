{{{breadcrumbsHtml}}}

<article class="content-page">
  <header class="page-header">
    <h1>{{page.title}}</h1>
    <p class="lead">{{page.description}}</p>
    {{#if page.date}}
    <p class="article-meta"><time datetime="{{page.date}}">{{page.date}}</time> · {{page.author}}</p>
    {{/if}}
  </header>

  {{#if quickAnswerHtml}}
  <div class="featured-snippet">{{{quickAnswerHtml}}}</div>
  {{/if}}

  <div class="prose">
    {{{contentHtml}}}
  </div>

  {{{tryItHtml}}}
  {{{faqHtml}}}
  {{{relatedHtml}}}
</article>
